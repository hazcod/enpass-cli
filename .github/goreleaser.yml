version: 2

before:
  hooks:
  - go mod download

builds:
  - id: linux64
    main: ./cmd/enpasscli/main.go
    binary: enpasscli
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++
    ldflags:
      - -s -w -X main.version={{.Version}}
  - id: linux-arm64
    main: ./cmd/enpasscli/main.go
    binary: enpasscli
    goos:
      - linux
    goarch:
      - arm64
    env:
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    ldflags:
      - -s -w -X main.version={{.Version}}
  - id: darwin
    main: ./cmd/enpasscli/main.go
    binary: enpasscli
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CC=o64-clang
      - CXX=o64-clang++
    ldflags:
      - -s -w -X main.version={{.Version}}
  - id: linux-armhf
    main: ./cmd/enpasscli/main.go
    binary: enpasscli
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - 7
    env:
      - CC=arm-linux-gnueabihf-gcc
      - CXX=arm-linux-gnueabihf-g++
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: enpass-cli
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - zip
    wrap_in_directory: true

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: hazcod
    name: enpass-cli
  prerelease: auto
  draft: false
